name: Block pycache artifacts

on:
  push:
  pull_request:

jobs:
  reject-bytecode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if Python bytecode artifacts are tracked
        run: |
          set -e
          matches=$(git ls-files | grep -E '(^|/)__pycache__/|\.py[co]$' || true)
          if [ -n "$matches" ]; then
            echo "Tracked bytecode/cache files detected:"
            echo "$matches"
            exit 1
          fi
